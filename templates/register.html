<!DOCTYPE html>
<html>
<head>
    <title>Create Account | PredictMaint AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#061426;">
    <div class="form-panel" style="width:480px;">
        <h1>Create Account</h1>
        <p style="color:#94a3b8;">Register new PredictMaint AI user</p>

        <form method="POST">
            <label>Username</label>
            <input type="text" name="username" required>

            <label>Full Name</label>
            <input type="text" name="name" required>

            <label>Role</label>
            <input type="text" name="role" placeholder="System Administrator" required>

            <label>Password</label>
            <input type="password" name="password" required>

            <label>Confirm Password</label>
            <input type="password" name="confirm_password" required>

            <button type="submit">Create Account</button>
        </form>

        {% if message %}
        <div class="result">
            <p>{{ message }}</p>
        </div>
        {% endif %}

        {% if error %}
        <div class="result" style="background:#4b1113;border:1px solid red;">
            <p>{{ error }}</p>
        </div>
        {% endif %}

        <p style="margin-top:20px;color:#94a3b8;">
            Already have account? <a href="/login" style="color:#38bdf8;">Login</a>
        </p>
    </div>
</div>

</body>
</html>
